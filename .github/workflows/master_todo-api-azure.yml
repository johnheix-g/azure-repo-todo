name: Build and deploy Node.js app to Azure Web App - todo-api-azure

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Install dependencies
        working-directory: ./server
        run: npm install

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: ./server

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7E9FFB9E611046E3A1AAF88835E71C80 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D070F67EEB6E4C3CB46E5F830773C6E3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DB936A9691D144FC8B059E4C5F321804 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "todo-api-azure"
          slot-name: "Production"
          package: .
